version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: TodoDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3087:3087"
    environment:
      ASPNETCORE_URLS: "http://+:3087"
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=TodoDb;Username=postgres;Password=postgres"
      Jwt__Key: "super-secret-key-minimum-32-characters-long!"
      Jwt__Issuer: "Todo.Api"
      Jwt__Audience: "Todo.Api"
    depends_on:
      db:
        condition: service_healthy